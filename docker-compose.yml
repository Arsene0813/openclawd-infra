services:
  postgres:
    image: postgres:16
    container_name: oc_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: oc_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: oc_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: oc_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    restart: unless-stopped
  api:
    build: ./api
    container_name: oc_api
    environment:
      OLLAMA_BASE_URL: http://oc_ollama:11434
      OLLAMA_MODEL: qwen2.5:7b
    depends_on:
      - ollama
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
volumes:
  pg_data:
  redis_data:
  qdrant_data:
  ollama_data:
